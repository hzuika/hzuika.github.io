<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
  </head>
  <body>
    <a href="./index.html">INDEX</a>    <br />
    このページではHTMLを記述する際に学んだこと等を載せていきます．<br/>

    aタグ:リンクを張ることができる．
    <pre><code>
      &lt;a href="URL"&gt;リンク&lt;/a&gt;
    </code></pre>

    codeタグ: ソースコードを記載できる．ただし，&lt;&gt;はタグとみなされるため，エスケープが必要．
    <pre><code>
      &lt;code&gt;ソースコード&lt;/code&gt;
    </code></pre>

    preタグ: 改行をそのまま記載できる．
    <pre><code>
      &lt;pre&gt;
        改行のある文章
        改行のある文章
      &lt;/pre&gt;
    </code></pre>

  </body>
</html>
